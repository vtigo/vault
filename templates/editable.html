<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body {
            background-color: darkslategrey;
            padding: 1rem;
            font-family: monospace;

            box-sizing: border-box;
            width: 100vw;
            height: 100vh;
            margin: 0;
        }

        .editable {
            background-color: oldlace;
            border-radius: 12px;
            padding: 10px;
            font-size: 1.5rem;

            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="editable" contenteditable="true">{{.Data}}</div>
</body>
</html>
